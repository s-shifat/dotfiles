; modified from: https://github.com/AriosJentu/i3-polybar-config.git
[fonts]
opensansreg = JetBrainsMono Nerd Font:Regular:size=8
opensanssemibold = JetBrainsMono:SemiBold:size=8
opensansbold = JetBrainsMono:Bold:size=8
opensansboldhigh = JetBrainsMono:Bold:size=11
opensansital = JetBrainsMono:Italic:size=9
xos = xos4\ Terminus:size=14;0
nerd = JetBrainsMono Nerd Font:size=12;0


[colors]
light-red = #ff5555
light-green = #249824
light-purple = #A44BA0

menucol-yellow = #f1fa8c
menucol-blue = #1771F1
menucol-orange = #ffb86c
menucol-red = #ff5555
menucol-green = #50fa7b
menucol-sealine = #00CF91
menucol-purple = #bd93f9
menucol-pink = #ff79c6
menucol-deepblue = #6560FF
menucol-lightblue = #60FFF7

fav-purple = #6633FF
dark = #282136
dark-red = #311
dark-green = #131
dark-purple = #201134
light = #f8f8f2
gray = #999
dark-gray = #333
comment = #6272a4
current-line = #44475a


[bar/main]
enable-ipc = true
override-redirect = false

bottom = false
width = 100%
height = 22

background = ${colors.dark}
foreground = ${colors.light}

line-color = ${colors.light-purple}
line-size = 2

separator = " "

;List of fonts
font-0 = ${fonts.opensansreg}
font-1 = ${fonts.opensanssemibold}
font-2 = ${fonts.opensansbold}
font-3 = ${fonts.opensansital}
font-4 = ${fonts.xos}
font-5 = ${fonts.nerd}
font-6 = ${fonts.opensansboldhigh}

wm-restack = i3
tray-position = right

modules-left = workspaces appfilemanager mediaplayer
modules-center = date media
modules-right = wifi brightness sound battery 


;Date correction
[module/date]
type = internal/date

time = %I:%M %P
date = %d %B, %A
date-alt = %A, %d %B, %Y
time-alt = %H:%M:%S

format-prefix = "’ü│ "
format-padding = 2
format-underline = ${colors.menucol-orange}
format-foreground = ${colors.menucol-orange}
interval = 20

label = %date% ’ĆŚ  %time%
label-font = 3
label-foreground = ${colors.light}


;Workspaces
[module/workspaces]
type = internal/i3

pin-workspaces = true
strip-wsnumbers = true
index-sort = true

format = <label-state> <label-mode>

label-dimmed-underline = ${colors.background}

;On editing mode (resize for ex)
label-mode = %mode%
label-mode-background = ${colors.dark-purple}
label-mode-underline = ${colors.fav-purple}
label-mode-padding = 2
label-mode-font = 3

label-focused = %index%
label-focused-background = ${colors.current-line}
label-focused-underline = ${colors.menucol-purple}
label-focused-padding = 3
label-focused-font = 3

label-unfocused = %index%
label-unfocused-foreground = ${colors.comment}
label-unfocused-padding = 3
label-unfocused-font = 3

label-visible = %index%
label-visible-background = ${colors.dark-purple}
label-visible-underline = ${colors.light-purple}
label-visible-padding = 3
label-visible-font = 3

label-urgent = %index%
label-urgent-background = ${colors.dark-red}
label-urgent-underline = ${colors.light-red}
label-urgent-padding = 3
label-urgent-font = 3


;Media Player
[module/mediaplayer]
type = custom/script
format = <label>
format-padding = 2
exec = ~/.config/polybar/player.sh
exec-if = playerctl status
interval = 0.5
label-font = 3
click-middle = playerctl play-pause

format-underline = ${colors.menucol-blue}
format-foreground = ${colors.menucol-blue}


[module/settings]
type = custom/text
content = Ņ×Ö
content-font = 7
content-padding = 2
click-left = sh ~/.config/i3/settings.sh

[module/appfilemanager]
type = custom/text
content = "’ü╗"
content-font = 7
content-padding = 2
click-left = "thunar > /dev/null 2>&1 &"

[module/xkillapp]
type = custom/text
content = "ŅłŹ"
content-font = 7
content-padding = 2
click-left = sleep 0.5 && xkill > /dev/null 2>&1 &


;Network
[module/wifi]
type = internal/network
; interface = wlp3s0
interface = wlo1
format-connected = ’ć½ <ramp-signal> <label-connected>
format-connected-padding = 2
format-connected-foreground = ${colors.menucol-green}
format-connected-underline = ${colors.menucol-green}

format-disconnected = "’ü▒ "
format-disconnected-font = 2
format-disconnected-padding = 2
format-disconnected-foreground = ${colors.menucol-yellow}
format-disconnected-underline = ${colors.menucol-yellow}

; ramp-signal-0 = " "
; ramp-signal-1 = "Ō¢é"
; ramp-signal-2 = "Ō¢ä"
; ramp-signal-3 = "Ō¢ģ"
; ramp-signal-4 = "Ō¢ć"
ramp-signal-0 = "ŌÜĆ"
ramp-signal-1 = "ŌÜü"
ramp-signal-2 = "ŌÜé"
ramp-signal-3 = "ŌÜā"
ramp-signal-4 = "ŌÜä"
; ramp-signal-5 = "ŌÜģ"
ramp-signal-font = 2
ramp-signal-foreground = ${colors.light}
; accumulate-stats = true
label-connected = ’üŻ %downspeed% ’üó %upspeed%
label-connected-foreground = colors.light

;Sound
[module/sound]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>
format-volume-padding = 2
format-volume-underline = ${colors.menucol-sealine}

label-volume = %percentage%
label-volume-font = 2

label-muted = ’æ” (%percentage%)
label-muted-font = 2
label-muted-padding = 2
label-muted-foreground = ${colors.gray}
label-muted-underline = ${colors.menucol-red}

ramp-volume-0 = "’Ć” "
ramp-volume-1 = "’Ć¦ "
ramp-volume-2 = "’Ć© "
ramp-volume-font = 7
ramp-volume-foreground = ${colors.menucol-sealine}


;Brightness
[module/brightness]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true

format = <label>
label = " %percentage%"
format-padding = 2
format-prefix = "’Ś¤ "
format-underline = ${colors.menucol-yellow}
format-prefix-foreground = ${colors.menucol-yellow}
label-font = 2


;Keyboard Layout
[module/layout]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = caps lock
blacklist-2 = scroll lock

format-prefix = "’ä£ "
format-underline = ${colors.menucol-blue}
format-foreground = ${colors.menucol-blue}
format-padding = 2

label-layout = %layout%
label-layout-font = 2
label-layout-foreground = ${colors.light}

;Keyboard lock states by xkeyboard
[module/xkbstates]
type = internal/xkeyboard
format = <label-indicator>

format-underline = ${colors.menucol-green}
format-padding = 2

label-indicator-on-capslock = "%{F#77BD8B}’Ż½ "
label-indicator-off-capslock = "%{F#333}’Ż½ "
label-indicator-on-numlock = "%{F#77BD8B}’óŻ "
label-indicator-off-numlock = "%{F#333}’óŻ "
label-indicator-on-scrolllock = "%{F#77BD8B}’óé"
label-indicator-off-scrolllock = "%{F#333}’óé"


;Keyboard lock states
[module/kbstates]
type = custom/script
format = <label>
format-underline = ${colors.menucol-green}
format-padding = 2

exec = $HOME/.config/polybar/kblocks.py
interval = 0.5
label-font = 7
label-foreground = ${colors.menucol-green}


;Custom Exit Button
[module/powermenu]
type = custom/text

content = ŌÅ╗
content-font = 7
content-padding = 2
content-foreground = ${colors.menucol-lightblue}
content-underline = ${colors.menucol-lightblue}

click-left = sh ~/.config/i3/powermenu.sh


;Battery Indicator
[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 99
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-charging-padding = 2
format-charging-underline = ${colors.menucol-pink}

format-discharging = <animation-discharging> <label-discharging>
format-discharging-padding = 2
format-discharging-underline = ${colors.menucol-pink}

label-charging = %percentage%
label-charging-font = 2

label-discharging = %percentage%
label-discharging-font = 2

animation-charging-0 = ’¢ģ
animation-charging-1 = ’¢å
animation-charging-2 = ’¢ć
animation-charging-3 = ’¢ł
animation-charging-4 = ’¢ä
animation-charging-framerate = 750
animation-charging-foreground = ${colors.menucol-pink}

animation-discharging-0 = ’ĢĖ
animation-discharging-1 = ’¢ü
animation-discharging-2 = ’¢Ć
animation-discharging-3 = ’Ģ┐
animation-discharging-4 = ’ĢŠ
animation-discharging-5 = ’ĢĮ
animation-discharging-6 = ’Ģ╝
animation-discharging-7 = ’Ģ╗
animation-discharging-8 = ’Ģ║
animation-discharging-9 = ’Ģ╣
animation-discharging-framerate = 750
animation-discharging-foreground = ${colors.menucol-pink}


[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
format-padding = 2
format-underline = ${colors.menucol-red}

format-prefix = ’āż
format-prefix-foreground = ${colors.menucol-red}

label = " %percentage%"
label-font = 3


[module/memory]
type = internal/memory
interval = 3
format = <label>
format-padding = 2
format-underline = ${colors.menucol-purple}

format-prefix = Ņē”
format-prefix-foreground = ${colors.menucol-purple}

label = " %gb_used%"
label-font = 3


[module/memoryswap]
type = internal/memory
interval = 3
format = <label>
format-padding = 2
format-underline = ${colors.menucol-pink}

format-prefix = ’æ│
format-prefix-foreground = ${colors.menucol-pink}

label = " %gb_swap_used%"
label-font = 3


[module/temperature]
type = internal/temperature
interval = 0.5
format = <ramp> <label>
format-padding = 2
format-underline = ${colors.menucol-deepblue}

format-warn = <ramp> <label-warn>
label = %temperature-c%
label-font = 3

label-warn = "%temperature-c% "
label-warn-font = 3

ramp-0 = ’ŗŗ
ramp-1 = ’ŗŗ
ramp-2 = ’ŗē
ramp-3 = ’ŗł
ramp-4 = ’ŗć
ramp-font = 7
ramp-foreground = ${colors.menucol-deepblue}
