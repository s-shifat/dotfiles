# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

#format = """
#[ÔĽşÔöÇuserÔöÇÔöÇÔöÇÔŁ»](bold blue) $username
#[ÔöúÔöÇsystemÔöÇÔŁ»](bold yellow) $hostname
#[ÔöúÔöÇprojectÔŁ»](bold red) $directory$rust$git_branch$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[ÔĽ░ÔöÇcmdÔöÇÔöÇÔöÇÔöÇÔŁ»](bold green) 
#"""
palette = 'catppuccin_mocha'
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = '@ [$hostname](bold yellow) '
trim_at = "."
disabled = false

# Replace the "ÔŁ»" symbol in the prompt with "Ô×ť"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[´Čî](bold green) "     # The "success_symbol" segment is being set to "Ô×ť" with the color "bold green"
error_symbol = "[ÔťŚ](bold red)"
# ´öÂ ´ö┤
# configure directory
[directory]
read_only = " ´áŻ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "ţîŻ  "

[conda]
symbol = "´äî "

[dart]
symbol = "ţ×ś "

#[directory]
#read_only = " ´áŻ"

[docker_context]
symbol = "´îł "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "ţëÁ "

[elm]
symbol = "ţśČ "

[git_branch]
symbol = "´Éś "

[golang]
symbol = "ţśž "

[hg_branch]
symbol = "´Éś "

[java]
symbol = "ţëľ "

[julia]
symbol = "ţśĄ "

[memory_usage]
symbol = "´íÜ "

[nim]
symbol = "´ÜĄ "

[nix_shell]
symbol = "´őť "

[package]
symbol = "´úľ "

[perl]
symbol = "ţŁę "

[php]
symbol = "ţśł "

[python]
symbol = "ţść "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "ţłż "

[rust]
symbol = "ţ×Ę "

[scala]
