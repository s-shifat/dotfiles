# Set your monitor configuration here
# See https://wiki.hyprland.org/Configuring/Monitors/
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/monitors.t2
#
# Default
# monitor=eDP-1, 1920x1080@60, 0x0, 1.50

# Custom
# to see monitor info run in terminal: hyprctl monitors all
monitor=eDP-1, 1920x1200@60.00300, 1920x0, 1.50

# Safe Option
# monitor=,preferred,auto,1

# HDMI Plugin
# Dual Monitor: ASUS
# monitor=HDMI-A-1,preferred,auto,1
# monitor=HDMI-A-1, 1920x1080@240.00, 1920x0, 1

monitor=HDMI-A-1, 1920x1200@60.00, 0x0, 1


# usb-c plugin
monitor=DP-1, 1920x1080@60.00, 0x0, 1

