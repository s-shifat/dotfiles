# See https://wiki.hyprland.org/Configuring/Window-Rules/

windowrule {
  name = windowrule-1
  opacity = 0.90 0.90
  match:class = ^(firefox)$
}

windowrule {
  name = windowrule-2
  opacity = 0.90 0.90
  match:class = ^(Brave-browser)$
}

windowrule {
  name = windowrule-3
  opacity = 0.80 0.80
  match:class = ^(code-oss)$
}

windowrule {
  name = windowrule-4
  opacity = 0.80 0.80
  match:class = ^(Code)$
}

windowrule {
  name = windowrule-5
  opacity = 0.80 0.80
  match:class = ^(code-url-handler)$
}

windowrule {
  name = windowrule-6
  opacity = 0.80 0.80
  match:class = ^(code-insiders-url-handler)$
}

windowrule {
