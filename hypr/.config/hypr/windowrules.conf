}


windowrule {
  name = windowrule-42
  float = on
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Progress Dialog — Dolphin)$
}

windowrule {
  name = windowrule-43
  float = on
  match:class = ^(org.kde.dolphin)$
  match:title = ^(Copying — Dolphin)$
}

windowrule {
  name = windowrule-44
  float = on
  match:class = ^(firefox)$
