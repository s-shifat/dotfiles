}

windowrule {
  name = windowrule-48
  float = on
  match:class = ^(com.github.unrud.VideoDownloader)$ # VideoDownloader-Gkk
}

# Matplotlib Figures Float
windowrule {
  name = windowrule-49
  float = on
  size = (monitor_w*0.75) (monitor_h*0.65)
  center = on
  match:class = .*([Mm]atplotlib).*
}



